name: Deploy Dev Environment

on:
  push:
    branches:
      - dev

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build backend image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/testingsystem-server:latest ./server

    - name: Build frontend image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/testingsystem-client:latest ./client

    - name: Push backend image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/testingsystem-server:latest

    - name: Push frontend image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/testingsystem-client:latest

    - name: Deploy on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}

        script: |
          cd ~/app/testing-shoe-s
          docker compose pull
          docker compose up -d
          docker image prune -a -f
