version: '3.8'

services:
  # Backend Server for Production
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: testing-system-server-prod
    environment:
      NODE_ENV: production
      PORT: 5000
      # Database will be external (AWS RDS)
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "5000:5000"
    networks:
      - testing-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Frontend Client for Production
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: testing-system-client-prod
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - testing-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

networks:
  testing-network:
    driver: bridge
