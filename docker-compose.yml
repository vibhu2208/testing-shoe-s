version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: testing-system-db
    environment:
      POSTGRES_DB: testing_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - testing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: testing-system-server
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: testing_system
      DB_USER: postgres
      DB_PASSWORD: password
      JWT_SECRET: your-jwt-secret-key
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - testing-network
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped

  # Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: testing-system-client
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - testing-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  testing-network:
    driver: bridge
